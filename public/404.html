<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>6A Logic</title>
    <script>
      // GitHub Pages SPA redirect: store path in sessionStorage, redirect to root
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    </script>
  </head>
  <body></body>
</html>
